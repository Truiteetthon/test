media: images
content:
  - name: projets
    label: Projets
    type: collection
    path: projets/
    fields:
      - name: projet
        label: Projet
        type: string
      - name: description
        label: Description
        type: string
      - name: année
        label: Année
        type: string
      - name: lieu
        label: Lieu
        type: string
      - name: photos
        label: Photos
        type: block
        list: true # Often used with type: block to allow multiple sections
        blockKey: type # Optional: customize the key used to store the block name, defaults to `_blo
        blocks:
          - name: cover
            label: Cover Image
            type: image
          - name: caption
            label: Caption
            type: string
